<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background-color: #f0f4f8;
      padding: 40px 20px;
      color: #2d3748;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 12px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    form {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 4px;
      margin-top: 16px;
    }

    label:first-of-type {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 1rem;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background-color: #3182ce;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #2b6cb0;
    }

    #workout-list {
      list-style: none;
    }

    #workout-list li {
      background: white;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      margin-bottom: 12px;
    }

    #workout-list li strong {
      font-size: 1rem;
    }

    #workout-list li span {
      display: block;
      font-size: 0.85rem;
      color: #718096;
      margin-top: 4px;
    }

    #empty-message {
      color: #a0aec0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Workout Tracker</h1>

    <form id="workout-form">
      <label for="exercise">Exercise Name</label>
      <input type="text" id="exercise" placeholder="e.g. Bench Press" required />

      <label for="sets">Sets</label>
      <input type="number" id="sets" placeholder="e.g. 3" min="1" required />

      <label for="reps">Reps</label>
      <input type="number" id="reps" placeholder="e.g. 10" min="1" required />

      <label for="date">Date</label>
      <input type="date" id="date" required />

      <button type="submit">Log Workout</button>
    </form>

    <h2>Logged Workouts</h2>
    <p id="empty-message">No workouts logged yet.</p>
    <ul id="workout-list"></ul>
  </div>

  <script>
    // This array holds all logged workouts while the page is open.
    // It resets when you refresh — we'll fix that in Step 2.
    let workouts = [];

    // Grab references to the HTML elements we'll interact with.
    const form = document.getElementById('workout-form');
    const list = document.getElementById('workout-list');
    const emptyMessage = document.getElementById('empty-message');

    // This function runs every time the form is submitted.
    form.addEventListener('submit', function (event) {
      // Prevent the page from reloading (default form behavior).
      event.preventDefault();

      // Read the values the user typed into each field.
      const workout = {
        exercise: document.getElementById('exercise').value,
        sets: document.getElementById('sets').value,
        reps: document.getElementById('reps').value,
        date: document.getElementById('date').value,
      };

      // Add this workout object to our array.
      workouts.push(workout);

      // Re-draw the list on screen.
      renderList();

      // Clear the form fields so it's ready for the next entry.
      form.reset();
    });

    // This function redraws the workout list based on the current array.
    function renderList() {
      // Hide the "no workouts" message once something is logged.
      emptyMessage.style.display = workouts.length === 0 ? 'block' : 'none';

      // Clear whatever was in the list before redrawing it.
      list.innerHTML = '';

      // Loop through each workout and create a list item for it.
      workouts.forEach(function (workout) {
        const item = document.createElement('li');
        item.innerHTML = `
          <strong>${workout.exercise}</strong>
          <span>${workout.sets} sets × ${workout.reps} reps &nbsp;|&nbsp; ${workout.date}</span>
        `;
        list.appendChild(item);
      });
    }
  </script>
</body>
</html>
